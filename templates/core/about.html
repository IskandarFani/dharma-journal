{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-7xl px-6 py-14">
    <div class="mx-auto max-w-3xl">
        <div class="border-b border-stone-300 pb-8 text-center">
            <div class="text-xs uppercase tracking-[0.35em] text-amber-800">
                {{ ui.about_kicker }}
            </div>

            <h2 class="serif mt-4 text-4xl md:text-6xl font-normal tracking-tight text-stone-950">
                {{ ui.about_title }}
            </h2>
        </div>

        <article class="serif mt-10 space-y-7 text-xl leading-9 text-stone-800">
            {% for paragraph in about_content %}
                <p>
                    {{ paragraph }}
                </p>
            {% endfor %}
        </article>

        <div class="mt-12 border-t border-stone-300 pt-8 text-center">
            <a
                href="{% url 'home' language %}"
                class="text-xs uppercase tracking-[0.25em] text-stone-600 hover:text-stone-950"
            >
                Dharma Journal
            </a>
        </div>
    </div>
</section>
{% endblock %}
